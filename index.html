<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cake Delight — London's Finest Cakes</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --beige:#f5efe6;--beige2:#ede3d5;--beige3:#e0d0bc;
  --white:#ffffff;--off-white:#fdfaf6;--warm-white:#faf7f2;
  --dusty:#d9c5ae;--mocha:#6b4c3b;--espresso:#3d2314;
  --caramel:#c8834a;--gold:#c9a84c;
  --text-dark:#2d1a0e;--text-mid:#5a3e2b;--text-light:#9b7b64;
  --shadow:rgba(61,35,20,0.12);--shadow2:rgba(61,35,20,0.22);
  --nav-h:70px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Lato',sans-serif;background:var(--beige);color:var(--text-dark);overflow-x:hidden;}
h1,h2,h3,h4,h5{font-family:'Times New Roman',Times,serif;font-weight:700;}
img{display:block;}
input,select,textarea,button{font-family:'Lato',sans-serif;}

/* ── NAV ── */
nav{position:fixed;top:0;width:100%;z-index:900;background:rgba(253,250,246,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--dusty);height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 4%;}
.nav-logo{font-family:'Times New Roman',serif;font-weight:700;font-size:1.6rem;color:var(--espresso);letter-spacing:1px;cursor:pointer;text-decoration:none;flex-shrink:0;}
.nav-logo span{color:var(--caramel);}
.nav-links{display:flex;list-style:none;height:var(--nav-h);align-items:stretch;margin:0 1rem;}
.nav-links li{position:relative;}
.nav-links li a{display:flex;align-items:center;padding:0 0.95rem;height:100%;font-size:0.8rem;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-mid);text-decoration:none;transition:color 0.25s;white-space:nowrap;position:relative;}
.nav-links li a::after{content:'';position:absolute;bottom:0;left:0.95rem;right:0.95rem;height:3px;background:var(--caramel);transform:scaleX(0);transition:transform 0.25s;transform-origin:center;}
.nav-links li a:hover,.nav-links li a.active{color:var(--caramel);}
.nav-links li a:hover::after,.nav-links li a.active::after{transform:scaleX(1);}
.nav-actions{display:flex;gap:0.5rem;align-items:center;flex-shrink:0;}
.btn-nav{background:var(--mocha);color:#fff;border:none;padding:8px 16px;font-size:0.78rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background 0.3s;white-space:nowrap;}
.btn-nav:hover{background:var(--espresso);}
.cart-btn{position:relative;background:none;border:1.5px solid var(--mocha);color:var(--mocha);padding:7px 13px;font-size:0.78rem;cursor:pointer;border-radius:2px;transition:all 0.3s;white-space:nowrap;}
.cart-btn:hover{background:var(--mocha);color:#fff;}
.cart-count{position:absolute;top:-8px;right:-8px;background:var(--caramel);color:#fff;border-radius:50%;width:19px;height:19px;font-size:0.66rem;display:flex;align-items:center;justify-content:center;font-weight:700;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{width:22px;height:2px;background:var(--espresso);display:block;transition:all 0.3s;}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}

/* ── MOBILE NAV ── */
.mobile-nav{position:fixed;top:var(--nav-h);left:0;width:100%;background:var(--warm-white);border-bottom:1px solid var(--dusty);z-index:850;padding:0.5rem 0;transform:translateY(-120%);transition:transform 0.35s ease;pointer-events:none;box-shadow:0 8px 24px var(--shadow);}
.mobile-nav.open{transform:translateY(0);pointer-events:all;}
.mobile-nav a{display:block;padding:0.85rem 5%;font-size:0.88rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-mid);text-decoration:none;border-bottom:1px solid var(--beige2);transition:all 0.2s;}
.mobile-nav a:hover{background:var(--beige);color:var(--caramel);}
.mobile-nav .mob-actions{padding:1rem 5%;display:flex;gap:0.5rem;flex-wrap:wrap;}

/* ── OFFER SLIDES ── */
.slides-wrap{position:relative;overflow:hidden;width:100%;margin-top:var(--nav-h);}
.slides-inner{display:flex;transition:transform 0.65s cubic-bezier(0.4,0,0.2,1);}
.slide{min-width:100%;padding:0 5%;display:flex;align-items:center;justify-content:center;gap:1.5rem;flex-wrap:wrap;text-align:center;}
.slide-0{background:linear-gradient(90deg,#3d2314,#6b4c3b);min-height:72px;}
.slide-1{background:linear-gradient(90deg,#7a3e1a,#c8834a);min-height:72px;}
.slide-2{background:linear-gradient(90deg,#2c1a0a,#5a3520);min-height:72px;}
.s-badge{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);color:#fff;font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:2px;white-space:nowrap;}
.s-text{color:#fff;font-family:'Times New Roman',serif;font-size:0.95rem;font-weight:700;}
.s-sub{color:rgba(255,255,255,0.72);font-size:0.78rem;}
.s-cta{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.5);color:#fff;padding:6px 18px;font-size:0.76rem;cursor:pointer;border-radius:2px;white-space:nowrap;transition:background 0.3s;letter-spacing:0.5px;}
.s-cta:hover{background:rgba(255,255,255,0.3);}
.slide-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.slide-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.35);cursor:pointer;transition:background 0.3s;}
.slide-dot.active{background:#fff;}
.slide-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:#fff;width:26px;height:26px;cursor:pointer;border-radius:50%;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.slide-arrow:hover{background:rgba(255,255,255,0.25);}
.slide-arrow.sl{left:10px;}
.slide-arrow.sr{right:10px;}

/* ── HERO ── */
.hero{min-height:calc(100vh - var(--nav-h) - 72px);display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(61,35,20,0.58) 0%,rgba(200,131,74,0.25) 100%),url('https://images.unsplash.com/photo-1509440159596-0249088772ff?w=1600&q=80') center/cover no-repeat;text-align:center;color:#fff;}
.hero-content{max-width:680px;padding:2rem;}
.hero-badge{display:inline-block;border:1px solid rgba(255,255,255,0.6);padding:6px 20px;font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:1.4rem;}
.hero h1{font-size:clamp(2.2rem,6vw,4.8rem);line-height:1.1;margin-bottom:1.1rem;text-shadow:0 2px 20px rgba(0,0,0,0.3);}
.hero p{font-size:1.08rem;font-weight:300;opacity:0.92;margin-bottom:2.4rem;line-height:1.7;}
.hero-ctas{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
.btn-primary{background:var(--caramel);color:#fff;border:none;padding:13px 30px;font-family:'Times New Roman',serif;font-weight:700;font-size:0.96rem;cursor:pointer;border-radius:2px;transition:all 0.3s;text-decoration:none;display:inline-block;}
.btn-primary:hover{background:var(--mocha);transform:translateY(-2px);}
.btn-outline-w{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,0.8);padding:13px 30px;font-family:'Times New Roman',serif;font-weight:700;font-size:0.96rem;cursor:pointer;border-radius:2px;transition:all 0.3s;text-decoration:none;display:inline-block;}
.btn-outline-w:hover{background:rgba(255,255,255,0.15);transform:translateY(-2px);}

/* ── SHARED SECTION ── */
section{padding:5rem 4%;}
.section-tag{font-size:0.7rem;letter-spacing:4px;text-transform:uppercase;color:var(--caramel);display:block;margin-bottom:0.7rem;}
.section-title{font-size:clamp(1.8rem,4vw,2.8rem);color:var(--espresso);margin-bottom:1.1rem;line-height:1.15;}
.section-sub{color:var(--text-light);font-size:0.98rem;line-height:1.7;max-width:600px;}
.divider{width:58px;height:3px;background:var(--caramel);margin:1.4rem 0;}

/* ── REPUTATION ── */
.reputation{background:var(--espresso);padding:3.5rem 4%;}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.3rem;max-width:1200px;margin:0 auto;}
.rep-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.11);padding:1.7rem 1.3rem;border-radius:4px;text-align:center;transition:all 0.4s;cursor:default;}
.rep-card:hover{background:rgba(200,131,74,0.18);border-color:var(--caramel);transform:translateY(-5px);}
.rep-icon{font-size:1.9rem;margin-bottom:0.8rem;display:block;}
.rep-card h3{color:#fff;font-size:1rem;margin-bottom:0.4rem;}
.rep-card p{color:rgba(255,255,255,0.6);font-size:0.83rem;line-height:1.6;}
.rep-card .quote{font-style:italic;font-size:0.88rem;color:var(--caramel);margin-top:0.7rem;font-family:'Times New Roman',serif;}

/* ── COLLECTIONS ── */
.collections{background:var(--white);}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.8rem;max-width:1300px;margin:2.5rem auto 0;}
.product-card{border-radius:4px;overflow:hidden;background:var(--off-white);box-shadow:0 2px 14px var(--shadow);transition:all 0.4s;border:1px solid var(--beige2);}
.product-card:hover{transform:translateY(-7px);box-shadow:0 12px 36px var(--shadow2);}
.product-img-wrap{position:relative;height:210px;overflow:hidden;cursor:pointer;}
.product-img-wrap img{width:100%;height:100%;object-fit:cover;transition:opacity 0.5s,transform 0.5s;}
.product-img-wrap .img-hover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.5s;}
.product-card:hover .img-hover{opacity:1;}
.product-card:hover .product-img-wrap img{transform:scale(1.05);}
.product-badge{position:absolute;top:9px;left:9px;background:var(--caramel);color:#fff;font-size:0.66rem;letter-spacing:1px;padding:3px 9px;border-radius:2px;text-transform:uppercase;}
.product-info{padding:1.15rem;}
.product-info h3{font-size:1.05rem;color:var(--espresso);margin-bottom:0.3rem;}
.product-info p{font-size:0.82rem;color:var(--text-light);margin-bottom:0.85rem;line-height:1.5;}
.product-footer{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;}
.price{font-family:'Times New Roman',serif;font-weight:700;font-size:1.1rem;color:var(--mocha);}
.price small{font-size:0.7rem;color:var(--text-light);font-family:'Lato',sans-serif;font-weight:400;}
.btn-cart{background:var(--mocha);color:#fff;border:none;padding:8px 14px;font-size:0.78rem;cursor:pointer;border-radius:2px;transition:all 0.3s;white-space:nowrap;}
.btn-cart:hover{background:var(--espresso);}

/* ── GALLERY ── */
.gallery{background:var(--beige2);}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:1200px;margin:2.5rem auto 0;}
.gallery-item{position:relative;overflow:hidden;border-radius:4px;cursor:pointer;}
.gallery-item.large{grid-column:span 2;}
.gallery-item img{width:100%;height:270px;object-fit:cover;transition:transform 0.6s;display:block;}
.gallery-item.large img{height:360px;}
.gallery-item:hover img{transform:scale(1.06);}
.gallery-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(61,35,20,0.78) 0%,transparent 60%);opacity:0;transition:opacity 0.4s;display:flex;align-items:flex-end;padding:1.3rem;}
.gallery-item:hover .gallery-overlay{opacity:1;}
.gallery-overlay h4{color:#fff;font-size:0.98rem;}
.gallery-overlay p{color:rgba(255,255,255,0.8);font-size:0.78rem;margin-top:3px;}

/* ── UPCOMING ── */
.upcoming{background:var(--warm-white);}
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.3rem;max-width:1200px;margin:2.5rem auto 0;}
.order-card{background:var(--white);border:1px solid var(--dusty);border-radius:4px;padding:1.5rem;transition:all 0.35s;position:relative;overflow:hidden;}
.order-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--caramel);}
.order-card:hover{transform:translateX(4px);box-shadow:0 8px 26px var(--shadow);}
.order-date{font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--caramel);margin-bottom:0.4rem;}
.order-card h3{font-size:1rem;color:var(--espresso);margin-bottom:0.35rem;}
.order-card p{font-size:0.83rem;color:var(--text-light);line-height:1.5;}
.order-slots{display:flex;flex-wrap:wrap;gap:5px;margin-top:0.8rem;}
.slot-pill{background:var(--beige);color:var(--mocha);font-size:0.71rem;padding:3px 9px;border-radius:20px;border:1px solid var(--beige3);}
.slot-pill.full{background:#f5e6e6;color:#a33;}

/* ── ABOUT ── */
.about{background:var(--beige);}
.about-inner{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;max-width:1200px;margin:0 auto;}
.about-img-wrap{position:relative;border-radius:4px;overflow:hidden;height:480px;}
.about-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s;}
.about-img-wrap:hover img{transform:scale(1.03);}
.about-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.9rem;margin-top:2rem;}
.stat-box{background:var(--white);border:1px solid var(--beige3);padding:1rem;border-radius:4px;text-align:center;}
.stat-box .num{font-family:'Times New Roman',serif;font-size:1.8rem;font-weight:700;color:var(--mocha);display:block;}
.stat-box span:last-child{font-size:0.76rem;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;}

/* ── TESTIMONIALS ── */
.testimonials{background:var(--espresso);}
.testimonials .section-title{color:#fff;}
.testimonials .section-tag{color:var(--dusty);}
.testimonials .divider{background:var(--dusty);}
.test-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.3rem;max-width:1200px;margin:2.5rem auto 0;}
.test-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:1.7rem;transition:all 0.4s;}
.test-card:hover{background:rgba(200,131,74,0.14);border-color:var(--caramel);transform:translateY(-5px);}
.stars{color:var(--gold);font-size:0.92rem;letter-spacing:2px;margin-bottom:0.8rem;}
.test-card blockquote{color:rgba(255,255,255,0.85);font-size:0.91rem;line-height:1.7;font-style:italic;font-family:'Times New Roman',serif;margin-bottom:1.3rem;}
.test-author{display:flex;align-items:center;gap:11px;}
.test-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--caramel);}
.test-name{color:#fff;font-size:0.86rem;font-weight:700;}
.test-label{color:rgba(255,255,255,0.5);font-size:0.74rem;}

/* ── CONTACT ── */
.contact{background:var(--white);}
.contact-inner{display:grid;grid-template-columns:1fr 1.2fr;gap:4rem;align-items:start;max-width:1200px;margin:0 auto;}
.contact-info p{color:var(--text-mid);line-height:1.7;margin-bottom:1.6rem;font-size:0.94rem;}
.info-item{display:flex;gap:11px;margin-bottom:1rem;align-items:flex-start;}
.info-icon{font-size:1.2rem;margin-top:2px;flex-shrink:0;}
.info-item h4{font-size:0.86rem;color:var(--espresso);margin-bottom:2px;}
.info-item p{font-size:0.82rem;color:var(--text-light);margin:0;}

/* ── FORMS ── */
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:0.9rem;}
.form-group label{font-size:0.73rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-mid);font-weight:700;}
.form-group input,.form-group textarea,.form-group select{border:1px solid var(--dusty);padding:10px 13px;font-size:0.9rem;background:var(--beige);border-radius:3px;transition:border 0.3s,background 0.2s;color:var(--text-dark);outline:none;width:100%;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--caramel);background:var(--white);}
.form-group textarea{resize:vertical;min-height:110px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;}
.form-error{font-size:0.72rem;color:#c62828;margin-top:3px;}

/* ── SUBSCRIBE ── */
.subscribe-bar{background:var(--caramel);padding:3rem 4%;text-align:center;}
.subscribe-bar h2{color:#fff;font-size:1.7rem;margin-bottom:0.4rem;}
.subscribe-bar p{color:rgba(255,255,255,0.85);margin-bottom:1.4rem;font-size:0.94rem;}
.subscribe-form{display:flex;max-width:460px;margin:0 auto;border-radius:2px;overflow:hidden;}
.subscribe-form input{flex:1;padding:13px 16px;border:none;font-size:0.92rem;background:#fff;outline:none;}
.subscribe-form button{padding:13px 22px;background:var(--espresso);color:#fff;border:none;cursor:pointer;font-size:0.88rem;transition:background 0.3s;white-space:nowrap;}
.subscribe-form button:hover{background:#1a0a04;}

/* ── FOOTER ── */
footer{background:var(--espresso);padding:4rem 4% 2rem;}
.footer-top{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr;gap:2.5rem;max-width:1200px;margin:0 auto 3rem;}
.footer-brand .logo-f{font-family:'Times New Roman',serif;font-weight:700;font-size:1.5rem;color:#fff;display:block;margin-bottom:0.9rem;}
.footer-brand .logo-f span{color:var(--caramel);}
.footer-brand p{color:rgba(255,255,255,0.52);font-size:0.84rem;line-height:1.7;}
.footer-brand .f-contact{margin-top:1.1rem;display:flex;flex-direction:column;gap:0.35rem;}
.footer-brand .f-contact span{color:rgba(255,255,255,0.58);font-size:0.82rem;}
.footer-col h4{color:#fff;font-size:0.84rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1.1rem;}
.footer-col ul{list-style:none;}
.footer-col ul li{margin-bottom:0.55rem;}
.footer-col ul li a{color:rgba(255,255,255,0.52);font-size:0.84rem;text-decoration:none;transition:color 0.3s;}
.footer-col ul li a:hover{color:var(--caramel);}
.footer-cakes{max-width:1200px;margin:0 auto 2.5rem;}
.footer-cakes h4{color:#fff;font-family:'Times New Roman',serif;font-size:1.3rem;margin-bottom:1.2rem;}
.footer-cake-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1rem;}
.footer-cake-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;transition:all 0.4s;cursor:pointer;}
.footer-cake-card:hover{transform:translateY(-5px);border-color:var(--caramel);}
.footer-cake-img{position:relative;height:120px;overflow:hidden;}
.footer-cake-img img{width:100%;height:100%;object-fit:cover;transition:opacity 0.5s;}
.footer-cake-img .fc-hover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.5s;}
.footer-cake-card:hover .fc-hover{opacity:1;}
.footer-cake-info{padding:0.7rem;}
.footer-cake-info h5{color:#fff;font-size:0.84rem;margin-bottom:2px;}
.footer-cake-info span{color:var(--caramel);font-size:0.8rem;font-weight:700;}
.footer-bottom{border-top:1px solid rgba(255,255,255,0.1);padding-top:1.8rem;max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
.footer-bottom p{color:rgba(255,255,255,0.38);font-size:0.78rem;}
.pay-badges{display:flex;gap:6px;flex-wrap:wrap;}
.pay-badge{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.65);font-size:0.7rem;padding:4px 10px;border-radius:3px;letter-spacing:0.5px;}

/* ── CART PANEL ── */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;display:flex;align-items:flex-start;justify-content:flex-end;}
.cart-panel{background:var(--warm-white);width:420px;max-width:100vw;height:100vh;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,0.2);animation:slideIn 0.35s ease;}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.cart-header{padding:1.3rem 1.4rem;border-bottom:1px solid var(--dusty);display:flex;justify-content:space-between;align-items:center;}
.cart-header h2{font-size:1.2rem;color:var(--espresso);}
.cart-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text-light);line-height:1;}
.cart-items{flex:1;overflow-y:auto;padding:1rem 1.4rem;}

/* ════════════ HELPERS ════════════ */
function StarRating({n}){return <span>{'★'.repeat(n)}{'☆'.repeat(5-n)}</span>;}
function genRef(){return'CD-'+Math.floor(1000+Math.random()*9000);}
function today(){return new Date().toISOString().split('T')[0];}

/* ════════════ TOAST ════════════ */
function Toast({msg,onDone}){
  const[out,setOut]=useState(false);
  useEffect(()=>{const t1=setTimeout(()=>setOut(true),2400);const t2=setTimeout(onDone,2800);return()=>{clearTimeout(t1);clearTimeout(t2);};},[]);
  return <div className={`toast${out?' toast-out':''}`}><span>✓</span>{msg}</div>;
}

/* ════════════ OFFER SLIDES ════════════ */
function OfferSlides({onNav}){
  const[idx,setIdx]=useState(0);
  const timerRef=useRef();
  const go=useCallback(i=>{setIdx((i+OFFERS.length)%OFFERS.length);},[]);
  useEffect(()=>{timerRef.current=setInterval(()=>go(idx+1),5000);return()=>clearInterval(timerRef.current);},[idx]);
  const o=OFFERS[idx];
  return(
    <div className="slides-wrap">
      <div className="slides-inner" style={{transform:`translateX(-${idx*100}%)`}}>
        {OFFERS.map((o,i)=>(
          <div className={`slide slide-${i}`} key={i} style={{minHeight:'72px',paddingTop:'8px',paddingBottom:'16px'}}>
            <span className="s-badge">{o.tag}</span>
            <span className="s-text">{o.text}</span>
            <span className="s-sub">{o.sub}</span>
            <button className="s-cta" onClick={()=>onNav(o.link)}>{o.cta}</button>
          </div>
        ))}
      </div>
      <button className="slide-arrow sl" onClick={()=>go(idx-1)}>‹</button>
      <button className="slide-arrow sr" onClick={()=>go(idx+1)}>›</button>
      <div className="slide-dots">
        {OFFERS.map((_,i)=><span key={i} className={`slide-dot${i===idx?' active':''}`} onClick={()=>go(i)}/>)}
      </div>
    </div>
  );
}

/* ════════════ CHECKOUT PAGE ════════════ */
function CheckoutPage({cart,onSuccess,onBack,onSaveClient,onSaveOrder}){
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const[payMethod,setPayMethod]=useState('card');
  const[loading,setLoading]=useState(false);
  const[f,setF]=useState({firstName:'',lastName:'',email:'',countryCode:'+44',phone:'',addr1:'',addr2:'',addr3:'',street:'',postcode:''});
  const[card,setCard]=useState({number:'',expiry:'',cvv:'',name:''});
  const[errors,setErrors]=useState({});

  function set(k,v){setF(p=>({...p,[k]:v}));}
  function setC(k,v){setCard(p=>({...p,[k]:v}));}
  function fmtCard(v){return v.replace(/\D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim();}
  function fmtExpiry(v){v=v.replace(/\D/g,'').slice(0,4);return v.length>2?v.slice(0,2)+'/'+v.slice(2):v;}
  function fmtPostcode(v){return v.toUpperCase().replace(/[^A-Z0-9 ]/g,'').slice(0,8);}

  function validate(){
    const e={};
    if(!f.firstName.trim()) e.firstName='Required';
    if(!f.lastName.trim()) e.lastName='Required';
    if(!/\S+@\S+\.\S+/.test(f.email)) e.email='Valid email required';
    if(!f.phone.replace(/\s/g,'').match(/^\d{9,12}$/)) e.phone='Valid mobile number required';
    if(!f.addr1.trim()) e.addr1='Required';
    if(!f.street.trim()) e.street='Required';
    if(!f.postcode.trim()) e.postcode='Required';
    if(payMethod==='card'){
      if(card.number.replace(/\s/g,'').length<16) e.cardNum='Enter 16-digit card number';
      if(!/^\d{2}\/\d{2}$/.test(card.expiry)) e.expiry='MM/YY format';
      if(card.cvv.length<3) e.cvv='3 digits required';
      if(!card.name.trim()) e.cardName='Required';
    }
    setErrors(e);
    return Object.keys(e).length===0;
  }

  function handlePlaceOrder(e){
    e.preventDefault();
    if(!validate()) return;
    setLoading(true);
    setTimeout(()=>{
      const ref=genRef();
      const fullName=f.firstName+' '+f.lastName;
      const fullPhone=f.countryCode+' '+f.phone;
      const orderData={
        id:ref,client:fullName,email:f.email,phone:fullPhone,
        addr:`${f.addr1}${f.addr2?' / '+f.addr2:''}${f.addr3?' / '+f.addr3:''}, ${f.street}, ${f.postcode}`,
        items:cart.map(i=>`${i.name} ×${i.qty}`).join(', '),
        total,date:today(),status:'Confirmed',notified:true,payMethod
      };
      onSaveClient({name:fullName,email:f.email,phone:fullPhone,source:'order'});
      onSaveOrder(orderData);
      setLoading(false);
      onSuccess({ref,email:f.email,phone:fullPhone,name:fullName,total});
    },1800);
  }

  function handleApplePay(){
    setLoading(true);
    setTimeout(()=>{
      const ref=genRef();
      onSaveOrder({id:ref,client:'Apple Pay User',email:'—',phone:'—',addr:'—',items:cart.map(i=>`${i.name} ×${i.qty}`).join(', '),total,date:today(),status:'Confirmed',notified:true,payMethod:'applepay'});
      setLoading(false);
      onSuccess({ref,email:'your Apple Pay email',phone:'—',name:'Valued Customer',total});
    },1500);
  }

  return(
    <div className="checkout-page">
      <div className="checkout-inner">
        <div className="checkout-form-box">
          <h2>Checkout</h2>
          <p className="c-sub">Please fill in your details to complete your order.</p>
          <form onSubmit={handlePlaceOrder} noValidate>
            {/* Customer Details */}
            <div className="section-label">Customer Details</div>
            <div className="form-row">
              <div className="form-group">
                <label>First Name</label>
                <input value={f.firstName} onChange={e=>set('firstName',e.target.value)} placeholder="Jane" required/>
                {errors.firstName&&<span className="form-error">{errors.firstName}</span>}
              </div>
              <div className="form-group">
                <label>Last Name</label>
                <input value={f.lastName} onChange={e=>set('lastName',e.target.value)} placeholder="Smith" required/>
                {errors.lastName&&<span className="form-error">{errors.lastName}</span>}
              </div>
            </div>
            <div className="form-group">
              <label>Email Address</label>
              <input type="email" value={f.email} onChange={e=>set('email',e.target.value)} placeholder="jane.smith@example.com" required/>
              {errors.email&&<span className="form-error">{errors.email}</span>}
            </div>
            <div className="form-group">
              <label>Contact Number</label>
              <div className="phone-row">
                <select value={f.countryCode} onChange={e=>set('countryCode',e.target.value)}>
                  {COUNTRY_CODES.map(c=><option key={c.code} value={c.code}>{c.label}</option>)}
                </select>
                <div>
                  <input value={f.phone} onChange={e=>set('phone',e.target.value.replace(/\D/g,'').slice(0,12))} placeholder="7404752168" required/>
                  {errors.phone&&<span className="form-error">{errors.phone}</span>}
                </div>
              </div>
            </div>

            {/* Delivery Address */}
            <div className="section-label">Delivery Address</div>
            <div className="form-group">
              <label>House / Flat Number (Line 1)</label>
              <input value={f.addr1} onChange={e=>set('addr1',e.target.value)} placeholder="42" required/>
              {errors.addr1&&<span className="form-error">{errors.addr1}</span>}
            </div>
            <div className="form-group">
              <label>Apartment / Floor (Line 2 — Optional)</label>
              <input value={f.addr2} onChange={e=>set('addr2',e.target.value)} placeholder="Flat B"/>
            </div>
            <div className="form-group">
              <label>Building / Complex (Line 3 — Optional)</label>
              <input value={f.addr3} onChange={e=>set('addr3',e.target.value)} placeholder="Rose Court"/>
            </div>
            <div className="form-group">
              <label>Street Name</label>
              <input value={f.street} onChange={e=>set('street',e.target.value)} placeholder="Lavender Hill" required/>
              {errors.street&&<span className="form-error">{errors.street}</span>}
            </div>
            <div className="form-group">
              <label>UK Postcode</label>
              <input value={f.postcode} onChange={e=>set('postcode',fmtPostcode(e.target.value))} placeholder="SW11 5RQ" maxLength={8} required/>
              {errors.postcode&&<span className="form-error">{errors.postcode}</span>}
            </div>

            {/* Payment */}
            <div className="section-label">Payment Method</div>
            <div className="pay-methods">
              <label className={`pay-method-option${payMethod==='card'?' selected':''}`} onClick={()=>setPayMethod('card')}>
                <input type="radio" name="pay" value="card" checked={payMethod==='card'} onChange={()=>setPayMethod('card')}/>
                <div className="pay-method-label">
                  <strong>Debit / Credit Card</strong>
                  <span>Visa, Mastercard, American Express</span>
                </div>
                <div className="pay-method-logos">
                  <span className="card-chip">VISA</span>
                  <span className="card-chip">MC</span>
                  <span className="card-chip">AMEX</span>
                </div>
              </label>
              <label className={`pay-method-option${payMethod==='applepay'?' selected':''}`} onClick={()=>setPayMethod('applepay')}>
                <input type="radio" name="pay" value="applepay" checked={payMethod==='applepay'} onChange={()=>setPayMethod('applepay')}/>
                <div className="pay-method-label">
                  <strong>Apple Pay</strong>

function AuthModal({onClose,onRegister}){
  const[tab,setTab]=useState('signin');
  const[done,setDone]=useState(false);
  const[f,setF]=useState({name:'',email:'',password:''});
  function handle(e){
    e.preventDefault();

  }
  return(
    <div className="auth-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="auth-box">
        <div className="auth-top">
          <button className="auth-close-btn" onClick={onClose}>✕</button>

        </div>
        <div className="auth-tabs">
          <button className={`auth-tab${tab==='signin'?' active':''}`} onClick={()=>setTab('signin')}>Sign In</button>
          <button className={`auth-tab${tab==='signup'?' active':''}`} onClick={()=>setTab('signup')}>Register</button>
        </div>
        <div className="auth-body">
          {tab==='signin'?(
            <form onSubmit={handle}>
              <div className="form-group"><label>Email</label><input type="email" placeholder="hello@example.com" required/></div>
              <div className="form-group"><label>Password</label><input type="password" placeholder="••••••••" required/></div>
              <button className="btn-auth" type="submit">{done?'Signed In ✓':'Sign In'}</button>
            </form>
          ):(
            <form onSubmit={handle}>
              <div className="form-group"><label>Full Name</label><input value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))} placeholder="Your name" required/></div>
              <div className="form-group"><label>Email</label><input type="email" value={f.email} onChange={e=>setF(p=>({...p,email:e.target.value}))} placeholder="hello@example.com" required/></div>

            </form>
          )}
        </div>
      </div>
    </div>
  );
}

  const[adminLoginOpen,setAdminLoginOpen]=useState(false);
  const[adminOpen,setAdminOpen]=useState(false);
  const[toast,setToast]=useState(null);
  const[orderInfo,setOrderInfo]=useState(null);
  const[clients,setClients]=useState(INIT_CLIENTS);
  const[ordersAdmin,setOrdersAdmin]=useState(INIT_ORDERS_ADMIN);
  const[subscribers,setSubscribers]=useState(INIT_SUBSCRIBERS);

  // Handle keyboard shortcut for admin (Ctrl+Shift+A)
  useEffect(()=>{
    function onKey(e){if(e.ctrlKey&&e.shiftKey&&e.key==='A'){setAdminLoginOpen(true);}}
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[]);

  function addToCart(product){
    setCart(prev=>{
      const ex=prev.find(i=>i.id===product.id);
      if(ex) return prev.map(i=>i.id===product.id?{...i,qty:i.qty+1}:i);
      return[...prev,{...product,qty:1}];
    });
    setToast(`${product.name} added to cart`);
  }
  function adjustQty(id,delta){setCart(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+delta)}:i));}
  function removeItem(id){setCart(prev=>prev.filter(i=>i.id!==id));}
  const totalQty=cart.reduce((s,i)=>s+i.qty,0);

  function saveClient({name,email,phone='—',source='order'}){
    setClients(prev=>{
      const ex=prev.find(c=>c.email===email);
      if(ex){
        return prev.map(c=>c.email===email?{...c,orders:c.orders+1,total:c.total+(cart.reduce((s,i)=>s+i.price*i.qty,0)||0),status:c.orders>=3?'VIP':'Active'}:c);
      }
      return[...prev,{id:prev.length+1,name,email,phone,joined:today(),orders:1,total:cart.reduce((s,i)=>s+i.price*i.qty,0)||0,status:'New',source}];
    });
  }
  function saveOrder(order){setOrdersAdmin(prev=>[...prev,order]);}
  function saveSubscriber(email){
    setSubscribers(prev=>{
      if(prev.find(s=>s.email===email)) return prev;
      return[...prev,{id:prev.length+1,email,joined:today()}];
    });
    setToast('Subscribed! Check your inbox soon.');
  }
  function registerClient({name,email}){
    setClients(prev=>{
      if(prev.find(c=>c.email===email)) return prev;
      return[...prev,{id:prev.length+1,name,email,phone:'—',joined:today(),orders:0,total:0,status:'New',source:'signup'}];
    });
    setToast(`Welcome, ${name.split(' ')[0]}! Account created.`);
  }

  function handleNav(id){
    setPage(id);
    if(id!=='checkout'&&id!=='confirmation'){
      setTimeout(()=>{
        const el=document.getElementById(id);
        if(el) el.scrollIntoView({behavior:'smooth'});
        else window.scrollTo({top:0,behavior:'smooth'});
      },100);
    }
  }

  function handleOrderSuccess(info){
    setOrderInfo(info);
    setCart([]);
    setPage('confirmation');
    window.scrollTo({top:0,behavior:'smooth'});
  }

  const showNav=page!=='checkout'&&page!=='confirmation';
  const showSlides=page!=='checkout'&&page!=='confirmation';
  const showFooter=page!=='checkout'&&page!=='confirmation';

  return(
    <>
    {showNav&&<Nav activePage={page} onNav={handleNav} onCart={()=>setCartOpen(true)} cartQty={totalQty} onAuth={()=>setAuthOpen(true)} onAdmin={()=>setAdminLoginOpen(true)}/>}
    {showSlides&&<OfferSlides onNav={handleNav}/>}

    {/* PAGE CONTENT */}
    {page==='home'&&<><HomePage onNav={handleNav} addToCart={addToCart}/><CollectionsPage addToCart={addToCart}/><GalleryPage/><OrdersPage/><AboutPage/><TestimonialsPage/><ContactPage addToast={msg=>setToast(msg)}/></>}
    {page==='collections'&&<CollectionsPage addToCart={addToCart}/>}
    {page==='gallery'&&<GalleryPage/>}
    {page==='upcoming'&&<OrdersPage/>}
    {page==='about'&&<AboutPage/>}
    {page==='testimonials'&&<TestimonialsPage/>}
    {page==='contact'&&<ContactPage addToast={msg=>setToast(msg)}/>}
    {page==='checkout'&&<CheckoutPage cart={cart} onSuccess={handleOrderSuccess} onBack={()=>setPage('home')} onSaveClient={saveClient} onSaveOrder={saveOrder}/>}
    {page==='confirmation'&&orderInfo&&<OrderConfirmPage info={orderInfo} onContinue={()=>setPage('home')}/>}

    {showFooter&&<Footer addToCart={addToCart}/>}

    {/* PANELS & MODALS */}
    {cartOpen&&<CartPanel cart={cart} onClose={()=>setCartOpen(false)} onQty={adjustQty} onRemove={removeItem} onCheckout={()=>{setCartOpen(false);setPage('checkout');window.scrollTo({top:0,behavior:'smooth'});}}/>}
    {authOpen&&<AuthModal onClose={()=>setAuthOpen(false)} onRegister={registerClient}/>}
    {adminLoginOpen&&<AdminLogin onClose={()=>setAdminLoginOpen(false)} onSuccess={()=>{setAdminLoginOpen(false);setAdminOpen(true);}}/>}
    {adminOpen&&<AdminPanel clients={clients} orders={ordersAdmin} subscribers={subscribers} onClose={()=>setAdminOpen(false)}/>}
    {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
