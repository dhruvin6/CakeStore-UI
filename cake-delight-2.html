<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cake Delight — London's Finest Cakes</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --beige:#f5efe6;--beige2:#ede3d5;--beige3:#e0d0bc;
  --white:#ffffff;--off-white:#fdfaf6;--warm-white:#faf7f2;
  --dusty:#d9c5ae;--mocha:#6b4c3b;--espresso:#3d2314;
  --caramel:#c8834a;--gold:#c9a84c;
  --text-dark:#2d1a0e;--text-mid:#5a3e2b;--text-light:#9b7b64;
  --shadow:rgba(61,35,20,0.13);--shadow2:rgba(61,35,20,0.22);
  --nav-h:70px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Lato',sans-serif;background:var(--beige);color:var(--text-dark);overflow-x:hidden;}
h1,h2,h3,h4,h5{font-family:'Times New Roman',Times,serif;font-weight:700;}
img{display:block;}

/* ── NAV ── */
nav{
  position:fixed;top:0;width:100%;z-index:900;
  background:rgba(253,250,246,0.96);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--dusty);
  padding:0 5%;display:flex;align-items:center;justify-content:space-between;
  height:var(--nav-h);
}
.nav-logo{font-family:'Times New Roman',serif;font-weight:700;font-size:1.65rem;color:var(--espresso);letter-spacing:1px;cursor:pointer;text-decoration:none;}
.nav-logo span{color:var(--caramel);}
.nav-links{display:flex;gap:0;list-style:none;}
.nav-links li{position:relative;}
.nav-links li a{
  display:block;padding:0 1.1rem;height:var(--nav-h);line-height:var(--nav-h);
  font-size:0.82rem;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-mid);text-decoration:none;transition:color 0.25s;
  white-space:nowrap;
}
.nav-links li a:hover,.nav-links li a.active{color:var(--caramel);}
.nav-links li a::after{
  content:'';position:absolute;bottom:0;left:1.1rem;right:1.1rem;
  height:3px;background:var(--caramel);transform:scaleX(0);transition:transform 0.25s;
}
.nav-links li a:hover::after,.nav-links li a.active::after{transform:scaleX(1);}
.nav-actions{display:flex;gap:0.6rem;align-items:center;}
.btn-nav{background:var(--mocha);color:#fff;border:none;padding:8px 16px;font-family:'Lato',sans-serif;font-size:0.8rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background 0.3s;white-space:nowrap;}
.btn-nav:hover{background:var(--espresso);}
.cart-btn{position:relative;background:none;border:1.5px solid var(--mocha);color:var(--mocha);padding:8px 14px;font-size:0.8rem;cursor:pointer;border-radius:2px;transition:all 0.3s;font-family:'Lato',sans-serif;white-space:nowrap;}
.cart-btn:hover{background:var(--mocha);color:#fff;}
.cart-count{position:absolute;top:-8px;right:-8px;background:var(--caramel);color:#fff;border-radius:50%;width:20px;height:20px;font-size:0.68rem;display:flex;align-items:center;justify-content:center;font-weight:700;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;}
.hamburger span{width:24px;height:2px;background:var(--espresso);transition:all 0.3s;display:block;}

/* ── OFFER SLIDES ── */
.slides-wrap{position:relative;overflow:hidden;width:100%;margin-top:var(--nav-h);}
.slides-inner{display:flex;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);}
.slide{
  min-width:100%;height:78px;display:flex;align-items:center;justify-content:center;
  gap:2rem;padding:0 5%;text-align:center;
}
.slide-0{background:linear-gradient(90deg,var(--espresso),var(--mocha));}
.slide-1{background:linear-gradient(90deg,#7a3e1a,var(--caramel));}
.slide-2{background:linear-gradient(90deg,#2c1a0a,#5a3520);}
.slide-tag{background:var(--caramel);color:#fff;font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:2px;white-space:nowrap;}
.slide-text{color:#fff;font-size:0.95rem;font-family:'Times New Roman',serif;font-weight:700;}
.slide-sub{color:rgba(255,255,255,0.75);font-size:0.8rem;display:none;}
.slide-cta{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);color:#fff;padding:6px 18px;font-size:0.78rem;cursor:pointer;border-radius:2px;white-space:nowrap;font-family:'Lato',sans-serif;transition:background 0.3s;}
.slide-cta:hover{background:rgba(255,255,255,0.28);}
.slide-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
.slide-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);cursor:pointer;transition:background 0.3s;}
.slide-dot.active{background:#fff;}
.slide-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:#fff;width:28px;height:28px;cursor:pointer;border-radius:50%;font-size:0.9rem;display:flex;align-items:center;justify-content:center;}
.slide-arrow.left{left:12px;}
.slide-arrow.right{right:12px;}

/* ── HERO ── */
.hero{
  min-height:calc(100vh - var(--nav-h) - 78px);
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(61,35,20,0.58) 0%,rgba(200,131,74,0.28) 100%),
    url('https://images.unsplash.com/photo-1509440159596-0249088772ff?w=1600&q=80') center/cover no-repeat;
  text-align:center;color:#fff;
}
.hero-content{max-width:700px;padding:2rem;}
.hero-badge{display:inline-block;border:1px solid rgba(255,255,255,0.6);padding:6px 20px;font-size:0.72rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:1.5rem;}
.hero h1{font-size:clamp(2.2rem,6vw,4.8rem);line-height:1.1;margin-bottom:1.2rem;text-shadow:0 2px 20px rgba(0,0,0,0.3);}
.hero p{font-size:1.1rem;font-weight:300;opacity:0.92;margin-bottom:2.5rem;line-height:1.7;}
.hero-ctas{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
.btn-primary{background:var(--caramel);color:#fff;border:none;padding:13px 32px;font-family:'Times New Roman',serif;font-weight:700;font-size:0.98rem;cursor:pointer;border-radius:2px;transition:all 0.3s;text-decoration:none;display:inline-block;}
.btn-primary:hover{background:var(--mocha);transform:translateY(-2px);}
.btn-outline-w{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,0.8);padding:13px 32px;font-family:'Times New Roman',serif;font-weight:700;font-size:0.98rem;cursor:pointer;border-radius:2px;transition:all 0.3s;text-decoration:none;display:inline-block;}
.btn-outline-w:hover{background:rgba(255,255,255,0.15);transform:translateY(-2px);}

/* ── PAGE WRAPPER ── */
.page-section{min-height:100vh;padding-top:var(--nav-h);}
section{padding:5rem 5%;}
.section-tag{font-size:0.72rem;letter-spacing:4px;text-transform:uppercase;color:var(--caramel);display:block;margin-bottom:0.7rem;}
.section-title{font-size:clamp(1.8rem,4vw,2.8rem);color:var(--espresso);margin-bottom:1.2rem;line-height:1.15;}
.section-sub{color:var(--text-light);font-size:1rem;line-height:1.7;max-width:600px;}
.divider{width:60px;height:3px;background:var(--caramel);margin:1.5rem 0;}

/* ── REPUTATION ── */
.reputation{background:var(--espresso);padding:4rem 5%;}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1.4rem;max-width:1200px;margin:0 auto;}
.rep-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);padding:1.8rem 1.4rem;border-radius:4px;text-align:center;transition:all 0.4s;cursor:default;}
.rep-card:hover{background:rgba(200,131,74,0.2);border-color:var(--caramel);transform:translateY(-5px);}
.rep-icon{font-size:2rem;margin-bottom:0.8rem;display:block;}
.rep-card h3{color:#fff;font-size:1.05rem;margin-bottom:0.4rem;}
.rep-card p{color:rgba(255,255,255,0.62);font-size:0.85rem;line-height:1.6;}
.rep-card .quote{font-style:italic;font-size:0.9rem;color:var(--caramel);margin-top:0.7rem;font-family:'Times New Roman',serif;}

/* ── COLLECTIONS ── */
.collections{background:var(--white);}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.8rem;max-width:1300px;margin:2.5rem auto 0;}
.product-card{border-radius:4px;overflow:hidden;background:var(--off-white);box-shadow:0 2px 16px var(--shadow);transition:all 0.4s;border:1px solid var(--beige2);}
.product-card:hover{transform:translateY(-7px);box-shadow:0 12px 38px var(--shadow2);}
.product-img-wrap{position:relative;height:220px;overflow:hidden;cursor:pointer;}
.product-img-wrap img{width:100%;height:100%;object-fit:cover;transition:opacity 0.5s,transform 0.5s;}
.product-img-wrap .img-hover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.5s;}
.product-card:hover .img-hover{opacity:1;}
.product-card:hover .product-img-wrap img{transform:scale(1.05);}
.product-badge{position:absolute;top:10px;left:10px;background:var(--caramel);color:#fff;font-size:0.68rem;letter-spacing:1px;padding:4px 10px;border-radius:2px;text-transform:uppercase;}
.product-info{padding:1.2rem;}
.product-info h3{font-size:1.1rem;color:var(--espresso);margin-bottom:0.3rem;}
.product-info p{font-size:0.83rem;color:var(--text-light);margin-bottom:0.9rem;line-height:1.5;}
.product-footer{display:flex;align-items:center;justify-content:space-between;}
.price{font-family:'Times New Roman',serif;font-weight:700;font-size:1.15rem;color:var(--mocha);}
.price small{font-size:0.72rem;color:var(--text-light);font-family:'Lato',sans-serif;font-weight:400;}
.btn-cart{background:var(--mocha);color:#fff;border:none;padding:8px 16px;font-size:0.8rem;cursor:pointer;border-radius:2px;transition:all 0.3s;font-family:'Lato',sans-serif;}
.btn-cart:hover{background:var(--espresso);}

/* ── GALLERY ── */
.gallery{background:var(--beige2);}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:1200px;margin:2.5rem auto 0;}
.gallery-item{position:relative;overflow:hidden;border-radius:4px;cursor:pointer;}
.gallery-item.large{grid-column:span 2;}
.gallery-item img{width:100%;height:280px;object-fit:cover;transition:transform 0.6s;display:block;}
.gallery-item.large img{height:380px;}
.gallery-item:hover img{transform:scale(1.06);}
.gallery-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(61,35,20,0.78) 0%,transparent 60%);opacity:0;transition:opacity 0.4s;display:flex;align-items:flex-end;padding:1.4rem;}
.gallery-item:hover .gallery-overlay{opacity:1;}
.gallery-overlay h4{color:#fff;font-size:1rem;}
.gallery-overlay p{color:rgba(255,255,255,0.8);font-size:0.8rem;margin-top:3px;}

/* ── UPCOMING ── */
.upcoming{background:var(--warm-white);}
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.4rem;max-width:1200px;margin:2.5rem auto 0;}
.order-card{background:var(--white);border:1px solid var(--dusty);border-radius:4px;padding:1.6rem;transition:all 0.35s;position:relative;overflow:hidden;}
.order-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--caramel);}
.order-card:hover{transform:translateX(4px);box-shadow:0 8px 28px var(--shadow);}
.order-date{font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--caramel);margin-bottom:0.5rem;}
.order-card h3{font-size:1.05rem;color:var(--espresso);margin-bottom:0.4rem;}
.order-card p{font-size:0.85rem;color:var(--text-light);line-height:1.5;}
.order-slots{display:flex;flex-wrap:wrap;gap:6px;margin-top:0.9rem;}
.slot-pill{background:var(--beige);color:var(--mocha);font-size:0.73rem;padding:3px 10px;border-radius:20px;border:1px solid var(--beige3);}
.slot-pill.full{background:#f5e6e6;color:#a33;}

/* ── ABOUT ── */
.about{background:var(--beige);}
.about-inner{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;max-width:1200px;margin:0 auto;}
.about-img-wrap{position:relative;border-radius:4px;overflow:hidden;height:500px;}
.about-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s;}
.about-img-wrap:hover img{transform:scale(1.04);}
.about-stats{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:2rem;}
.stat-box{background:var(--white);border:1px solid var(--beige3);padding:1.1rem;border-radius:4px;text-align:center;}
.stat-box .num{font-family:'Times New Roman',serif;font-size:1.9rem;font-weight:700;color:var(--mocha);display:block;}
.stat-box span:last-child{font-size:0.78rem;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;}

/* ── TESTIMONIALS ── */
.testimonials{background:var(--espresso);}
.testimonials .section-title{color:#fff;}
.testimonials .section-tag{color:var(--dusty);}
.testimonials .divider{background:var(--dusty);}
.test-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.4rem;max-width:1200px;margin:2.5rem auto 0;}
.test-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:1.8rem;transition:all 0.4s;}
.test-card:hover{background:rgba(200,131,74,0.15);border-color:var(--caramel);transform:translateY(-5px);}
.stars{color:var(--gold);font-size:0.95rem;letter-spacing:2px;margin-bottom:0.9rem;}
.test-card blockquote{color:rgba(255,255,255,0.85);font-size:0.93rem;line-height:1.7;font-style:italic;font-family:'Times New Roman',serif;margin-bottom:1.4rem;}
.test-author{display:flex;align-items:center;gap:12px;}
.test-avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid var(--caramel);}
.test-name{color:#fff;font-size:0.88rem;font-weight:700;}
.test-label{color:rgba(255,255,255,0.5);font-size:0.76rem;}

/* ── CONTACT ── */
.contact{background:var(--white);}
.contact-inner{display:grid;grid-template-columns:1fr 1.2fr;gap:4rem;align-items:start;max-width:1200px;margin:0 auto;}
.contact-info p{color:var(--text-mid);line-height:1.7;margin-bottom:1.8rem;}
.info-item{display:flex;gap:12px;margin-bottom:1.1rem;align-items:flex-start;}
.info-icon{font-size:1.2rem;margin-top:1px;}
.info-item h4{font-size:0.88rem;color:var(--espresso);}
.info-item p{font-size:0.84rem;color:var(--text-light);margin:2px 0 0;}
.contact-form{display:flex;flex-direction:column;gap:1rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-mid);}
.form-group input,.form-group textarea,.form-group select{
  border:1px solid var(--dusty);padding:11px 13px;font-family:'Lato',sans-serif;
  font-size:0.9rem;background:var(--beige);border-radius:3px;
  transition:border 0.3s,background 0.3s;color:var(--text-dark);outline:none;width:100%;
}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--caramel);background:var(--white);}
.form-group textarea{resize:vertical;min-height:110px;}

/* ── SUBSCRIBE ── */
.subscribe-bar{background:var(--caramel);padding:3rem 5%;text-align:center;}
.subscribe-bar h2{color:#fff;font-size:1.7rem;margin-bottom:0.4rem;}
.subscribe-bar p{color:rgba(255,255,255,0.85);margin-bottom:1.4rem;font-size:0.95rem;}
.subscribe-form{display:flex;max-width:460px;margin:0 auto;}
.subscribe-form input{flex:1;padding:13px 16px;border:none;font-family:'Lato',sans-serif;font-size:0.93rem;background:#fff;outline:none;}
.subscribe-form button{padding:13px 22px;background:var(--espresso);color:#fff;border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:0.88rem;transition:background 0.3s;white-space:nowrap;}
.subscribe-form button:hover{background:#1a0a04;}

/* ── FOOTER ── */
footer{background:var(--espresso);padding:4rem 5% 2rem;}
.footer-top{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr;gap:3rem;max-width:1200px;margin:0 auto 3rem;}
.footer-brand .logo-f{font-family:'Times New Roman',serif;font-weight:700;font-size:1.4rem;color:#fff;display:block;margin-bottom:1rem;}
.footer-brand .logo-f span{color:var(--caramel);}
.footer-brand p{color:rgba(255,255,255,0.55);font-size:0.85rem;line-height:1.7;}
.footer-contact-list{margin-top:1rem;display:flex;flex-direction:column;gap:0.4rem;}
.footer-contact-list span{color:rgba(255,255,255,0.6);font-size:0.83rem;}
.footer-col h4{color:#fff;font-size:0.85rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1.1rem;}
.footer-col ul{list-style:none;}
.footer-col ul li{margin-bottom:0.55rem;}
.footer-col ul li a{color:rgba(255,255,255,0.55);font-size:0.85rem;text-decoration:none;transition:color 0.3s;cursor:pointer;}
.footer-col ul li a:hover{color:var(--caramel);}
.footer-cakes{max-width:1200px;margin:0 auto 3rem;}
.footer-cakes h4{color:#fff;font-family:'Times New Roman',serif;font-size:1.3rem;margin-bottom:1.3rem;}
.footer-cake-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1.1rem;}
.footer-cake-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;transition:all 0.4s;cursor:pointer;}
.footer-cake-card:hover{transform:translateY(-4px);border-color:var(--caramel);}
.footer-cake-img{position:relative;height:120px;overflow:hidden;}
.footer-cake-img img{width:100%;height:100%;object-fit:cover;transition:opacity 0.5s;}
.footer-cake-img .fc-hover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.5s;}
.footer-cake-card:hover .fc-hover{opacity:1;}
.footer-cake-info{padding:0.75rem;}
.footer-cake-info h5{color:#fff;font-size:0.85rem;margin-bottom:2px;}
.footer-cake-info span{color:var(--caramel);font-size:0.8rem;font-weight:700;}
.footer-bottom{border-top:1px solid rgba(255,255,255,0.1);padding-top:1.8rem;display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto;flex-wrap:wrap;gap:1rem;}
.footer-bottom p{color:rgba(255,255,255,0.4);font-size:0.78rem;}
.pay-badges{display:flex;gap:7px;flex-wrap:wrap;}
.pay-badge{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);font-size:0.7rem;padding:4px 10px;border-radius:3px;letter-spacing:0.5px;}

/* ── CHECKOUT PAGE ── */
.checkout-page{min-height:100vh;background:var(--beige);padding:calc(var(--nav-h) + 2rem) 5% 4rem;}
.checkout-inner{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:1.2fr 1fr;gap:3rem;align-items:start;}
.checkout-panel{background:var(--white);border:1px solid var(--beige3);border-radius:6px;padding:2rem;}
.checkout-panel h2{font-size:1.4rem;color:var(--espresso);margin-bottom:0.3rem;}
.checkout-panel .panel-sub{font-size:0.82rem;color:var(--text-light);margin-bottom:1.5rem;}
.checkout-divider{height:1px;background:var(--beige2);margin:1.3rem 0;}
.co-section-title{font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--caramel);margin-bottom:0.9rem;}
.phone-row{display:grid;grid-template-columns:120px 1fr;gap:0.6rem;}
.co-order-item{display:flex;gap:12px;align-items:center;padding:0.7rem 0;border-bottom:1px solid var(--beige2);}
.co-order-item:last-child{border-bottom:none;}
.co-order-item img{width:56px;height:56px;object-fit:cover;border-radius:3px;}
.co-order-item-info{flex:1;}
.co-order-item-info h5{font-size:0.9rem;color:var(--espresso);}
.co-order-item-info span{font-size:0.8rem;color:var(--text-light);}
.co-order-item strong{font-family:'Times New Roman',serif;color:var(--mocha);font-size:0.98rem;}
.co-total-row{display:flex;justify-content:space-between;padding:0.5rem 0;}
.co-total-row span{font-size:0.9rem;color:var(--text-mid);}
.co-total-row strong{font-family:'Times New Roman',serif;font-size:1.1rem;color:var(--espresso);}
.co-total-row.grand{border-top:2px solid var(--caramel);margin-top:0.5rem;padding-top:0.9rem;}
.co-total-row.grand span{font-weight:700;color:var(--espresso);}
.co-total-row.grand strong{font-size:1.3rem;color:var(--mocha);}

/* ───────────────────────── HELPERS ───────────────────────── */
function genOrderRef(){return 'CD-'+Math.floor(1000+Math.random()*9000);}
function StarRating({n}){return <span>{'★'.repeat(n)}{'☆'.repeat(5-n)}</span>;}
function Toast({msg,onDone}){
  const [out,setOut]=useState(false);
  useEffect(()=>{const a=setTimeout(()=>setOut(true),2400);const b=setTimeout(onDone,2800);return()=>{clearTimeout(a);clearTimeout(b);};},[]);
  return <div className={`toast${out?' toast-out':''}`}>✓ {msg}</div>;
}

/* ── OFFER SLIDES ── */
function OfferSlides({onNav}){
  const [cur,setCur]=useState(0);
  const timerRef=useRef(null);
  const start=useCallback(()=>{timerRef.current=setInterval(()=>setCur(c=>(c+1)%SLIDES.length),5000);},[]);
  useEffect(()=>{start();return()=>clearInterval(timerRef.current);},[]);
  function go(n){setCur((cur+n+SLIDES.length)%SLIDES.length);clearInterval(timerRef.current);start();}
  const s=SLIDES[cur];
  return(
    <div className="slides-wrap">
      <div className="slides-inner" style={{transform:`translateX(-${cur*100}%)`}}>
        {SLIDES.map((sl,i)=>(
          <div key={i} className={`slide ${sl.cls}`}>
            <span className="slide-tag">{sl.tag}</span>
            <span className="slide-text">{sl.text}</span>
            <span className="slide-sub">{sl.sub}</span>
            <button className="slide-cta" onClick={()=>onNav(sl.link)}>{sl.cta}</button>
          </div>
        ))}
      </div>
      <button className="slide-arrow left" onClick={()=>go(-1)}>‹</button>
      <button className="slide-arrow right" onClick={()=>go(1)}>›</button>
      <div className="slide-dots">
        {SLIDES.map((_,i)=><div key={i} className={`slide-dot${i===cur?' active':''}`} onClick={()=>{setCur(i);clearInterval(timerRef.current);start();}}/>)}
      </div>
    </div>
  );
}

/* ── CHECKOUT PAGE ── */
function CheckoutPage({cart,onBack,onOrderComplete,onSaveOrder}){
  const [payMethod,setPayMethod]=useState('card');
  const [step,setStep]=useState('details'); // details | payment | success
  const [orderRef,setOrderRef]=useState('');
  const [notifSent,setNotifSent]=useState(false);
  const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const delivery=subtotal>=45?0:3.99;
  const total=subtotal+delivery;
  const [details,setDetails]=useState({
    firstName:'',lastName:'',email:'',cc:'+44',mobile:'',
    addr1:'',addr2:'',addr3:'',street:'',postcode:'',
    cardName:'',cardNum:'',expiry:'',cvv:''
  });
  const ud=(k,v)=>setDetails(p=>({...p,[k]:v}));
  function fmtCard(v){return v.replace(/\D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim();}
  function fmtExp(v){const n=v.replace(/\D/g,'').slice(0,4);return n.length>2?n.slice(0,2)+'/'+n.slice(2):n;}

  function placeOrder(e){
    e.preventDefault();
    const ref=genOrderRef();
    setOrderRef(ref);
    onSaveOrder({
      ref,
      name:`${details.firstName} ${details.lastName}`,
      email:details.email,
      phone:`${details.cc} ${details.mobile}`,
      addr:`${details.addr1}${details.addr2?' Flat '+details.addr2+',':''} ${details.addr3?details.addr3+',':''} ${details.street}, ${details.postcode}`,
      items:cart.map(i=>`${i.name} x${i.qty}`).join(', '),
      total:`£${total.toFixed(2)}`,
      method:payMethod==='card'?'Debit/Credit Card':'Apple Pay',
      date:new Date().toISOString().split('T')[0]
    });
    setTimeout(()=>setNotifSent(true),800);
    setStep('success');
  }

  if(step==='success') return(
    <div className="order-success">
      <div className="success-card">
        <div className="success-icon">🎂</div>
        <h2>Order Confirmed!</h2>

          <span>Order Reference</span>

        <div className="success-ref">
          <span>Delivery Address</span>
          <strong style={{fontFamily:'Lato',fontWeight:400,fontSize:'0.88rem'}}>{details.addr1}{details.addr2?' · Flat '+details.addr2:''}  {details.addr3?'· '+details.addr3+' ':''}{details.street}, {details.postcode}</strong>
        </div>

            <span>Email confirmation → {details.email}</span>
          </div>
          <div className={`notif-badge${notifSent?' sent':''}`}>
            <span>{notifSent?'✓':'⏳'}</span>

          <div style={{background:'var(--beige)',border:'1px solid var(--beige3)',borderRadius:'3px',padding:'8px 14px',fontSize:'0.75rem',color:'var(--text-light)',textAlign:'left',marginTop:'4px'}}>
            Note: In production, these would be sent via SendGrid (email) and Twilio (SMS). Backend integration required.
          </div>
        </div>
        <button className="btn-primary" onClick={onOrderComplete} style={{marginTop:'1rem',width:'100%'}}>Back to Home</button>
      </div>
    </div>
  );

  return(
    <div className="checkout-page">
      <div style={{maxWidth:'1000px',margin:'0 auto 1.5rem'}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:'var(--caramel)',fontSize:'0.88rem',display:'flex',alignItems:'center',gap:'6px',fontFamily:'Lato,sans-serif'}}>← Back to Cart</button>

      <form onSubmit={placeOrder}>
      <div className="checkout-inner">
        {/* LEFT: Details + Payment */}

          {/* Contact */}

            <h2>Contact Details</h2>

            <div className="form-row">
              <div className="form-group"><label>First Name</label><input value={details.firstName} onChange={e=>ud('firstName',e.target.value)} placeholder="Jane" required/></div>
              <div className="form-group"><label>Last Name</label><input value={details.lastName} onChange={e=>ud('lastName',e.target.value)} placeholder="Smith" required/></div>
            </div>
            <div className="form-group" style={{marginTop:'0.9rem'}}><label>Email Address</label><input type="email" value={details.email} onChange={e=>ud('email',e.target.value)} placeholder="jane.smith@example.com" required/></div>

                  <thead><tr><th>ID</th><th>Email Address</th><th>Subscribed On</th><th>Status</th></tr></thead>
                  <tbody>
                    {subscribers.map(s=>(
                      <tr key={s.id}><td>#{s.id}</td><td>{s.email}</td><td>{s.joined}</td><td><span className="badge-sub">Active</span></td></tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <p className="admin-schema">SQL: CREATE TABLE subscribers (id INT PRIMARY KEY AUTO_INCREMENT, email VARCHAR(150) UNIQUE NOT NULL, subscribed_at DATETIME DEFAULT CURRENT_TIMESTAMP, status ENUM('Active','Unsubscribed') DEFAULT 'Active'); — Production: connect to Mailchimp or SendGrid list API.</p>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── ADMIN LOGIN MODAL ── */
function AdminLogin({onClose,onSuccess}){
  const [pw,setPw]=useState('');
  const [err,setErr]=useState(false);
  function attempt(e){
    e.preventDefault();
    if(pw===ADMIN_PASSWORD){onSuccess();}
    else{setErr(true);setPw('');}
  }
  return(
    <div className="admin-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="admin-login-box">
        <div className="admin-login-top">
          <h2>Owner Access</h2>
          <button className="admin-close" onClick={onClose}>✕</button>
        </div>
        <div className="admin-login-body">
          <p>This panel is restricted to the store owner only. Enter the admin password to continue.</p>
          <form onSubmit={attempt}>
            <div className="form-group">
              <label>Admin Password</label>
              <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} placeholder="Enter password" required autoFocus/>
            </div>
            {err&&<p style={{color:'#c62828',fontSize:'0.82rem',marginTop:'0.5rem'}}>Incorrect password. Access denied.</p>}
            <button className="btn-auth" style={{marginTop:'1rem',background:'var(--espresso)'}}>Access Admin Panel</button>
          </form>
          <p style={{marginTop:'1rem',fontSize:'0.75rem',color:'var(--text-light)'}}>Demo password: CakeDelight2026</p>
        </div>
      </div>
    </div>
  );
}

/* ───────────────────────── MAIN APP ───────────────────────── */
function App(){
  const [page,setPage]=useState('home'); // home|about|collections|gallery|upcoming|testimonials|contact|checkout
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [authOpen,setAuthOpen]=useState(false);
  const [adminLoginOpen,setAdminLoginOpen]=useState(false);
  const [adminOpen,setAdminOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [subEmail,setSubEmail]=useState('');
  const [subDone,setSubDone]=useState(false);
  const [mobileMenuOpen,setMobileMenuOpen]=useState(false);
  const [clients,setClients]=useState(INIT_CLIENTS);
  const [subscribers,setSubscribers]=useState(INIT_SUBSCRIBERS);
  const [ordersDb,setOrdersDb]=useState(INIT_ORDERS_DB);

  function navigate(to){
    const anchor=to.startsWith('#')?to.slice(1):to;
    if(['about','collections','gallery','upcoming','testimonials','contact'].includes(anchor)){
      setPage('home');
      setTimeout(()=>{
        const el=document.getElementById(anchor);
        if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
      },60);
    } else if(to==='checkout'){
      setPage('checkout');
      window.scrollTo(0,0);
    } else {
      setPage('home');
      window.scrollTo(0,0);
    }
    setMobileMenuOpen(false);
  }

  function addToCart(product){
    setCart(prev=>{
      const ex=prev.find(i=>i.id===product.id);
      return ex ? prev.map(i=>i.id===product.id?{...i,qty:i.qty+1}:i) : [...prev,{...product,qty:1}];
    });
    setToast(`${product.name} added`);
  }
  function adjustQty(id,delta){setCart(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+delta)}:i));}
  function removeItem(id){setCart(prev=>prev.filter(i=>i.id!==id));}
  const totalQty=cart.reduce((s,i)=>s+i.qty,0);

  function handleSubscribe(e){
    e.preventDefault();
    if(subEmail&&!subscribers.find(s=>s.email===subEmail)){
      const today=new Date().toISOString().split('T')[0];
      setSubscribers(prev=>[...prev,{id:prev.length+1,email:subEmail,joined:today}]);
      setToast('Subscribed! Welcome to Cake Delight.');
    }
    setSubDone(true); setSubEmail('');
  }

  function registerClient({name,email,phone}){
    if(!clients.find(c=>c.email===email)){
      const today=new Date().toISOString().split('T')[0];
      setClients(prev=>[...prev,{id:prev.length+1,name,email,phone,addr:'—',joined:today,orders:0,total:0,status:'New',type:'customer'}]);
      setToast(`Welcome, ${name.split(' ')[0]}!`);
    }
  }

  function saveOrder(o){
    setOrdersDb(prev=>[...prev,{...o,status:'Processing'}]);
    const existClient=clients.find(c=>c.email===o.email);
    if(existClient){
      setClients(prev=>prev.map(c=>c.email===o.email
        ?{...c,orders:c.orders+1,total:c.total+parseFloat(o.total.replace('£','')),status:c.orders>=3?'VIP':'Active',addr:o.addr||c.addr}
        :c
      ));
    } else {
      const today=new Date().toISOString().split('T')[0];
      setClients(prev=>[...prev,{
        id:prev.length+1,name:o.name,email:o.email,phone:o.phone,
        addr:o.addr,joined:today,orders:1,
        total:parseFloat(o.total.replace('£','')),status:'New',type:'customer'
      }]);
    }
  }

  const NAV_ITEMS=[
    {id:'about',label:'About Us'},
    {id:'collections',label:'Collections'},
    {id:'gallery',label:'Making Cakes'},
    {id:'upcoming',label:'Orders'},
    {id:'testimonials',label:'Testimonials'},
    {id:'contact',label:'Contact'},
  ];

  /* ─── RENDER CHECKOUT ─── */
  if(page==='checkout') return(
    <>
      <nav>
        <a className="nav-logo" onClick={()=>navigate('home')} style={{cursor:'pointer'}}>Cake <span>Delight</span></a>
        <ul className="nav-links">
          {NAV_ITEMS.map(n=><li key={n.id}><a onClick={()=>navigate(n.id)} style={{cursor:'pointer'}}>{n.label}</a></li>)}
        </ul>
        <div className="nav-actions">
          <button className="cart-btn" onClick={()=>setCartOpen(true)}>
            Cart {totalQty>0&&<span className="cart-count">{totalQty}</span>}
          </button>
        </div>
      </nav>
      <CheckoutPage
        cart={cart}
        onBack={()=>setPage('home')}
        onOrderComplete={()=>{setCart([]);setPage('home');}}
        onSaveOrder={saveOrder}
      />
      {cartOpen&&<CartPanel cart={cart} onClose={()=>setCartOpen(false)} onQty={adjustQty} onRemove={removeItem} onCheckout={()=>{setCartOpen(false);}}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </>

          <li key={n.id}>
            <a onClick={()=>navigate(n.id)} style={{cursor:'pointer'}}>{n.label}</a>

        </button>

    </nav>

    {/* MOBILE NAV */}

      {NAV_ITEMS.map(n=>(

    {/* OFFER SLIDES */}

    {/* HERO */}

        <p>Handcrafted to order from our South London kitchen. Every layer tells a story — yours.</p>
        <div className="hero-ctas">
          <button className="btn-primary" onClick={()=>navigate('collections')}>Shop Cakes</button>
          <button className="btn-outline-w" onClick={()=>navigate('about')}>Our Story</button>
        </div>
      </div>
    </div>

    {/* REPUTATION */}
    <div className="reputation">
      <div className="rep-grid">
        {REP_CARDS.map((c,i)=>(
          <div className="rep-card" key={i}>
            <span className="rep-icon">{c.icon}</span>

            <p>{c.text}</p>
            <div className="quote">{c.quote}</div>

    {/* COLLECTIONS */}

      <div className="products-grid">
        {PRODUCTS.map(p=>(
