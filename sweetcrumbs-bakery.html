<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SweetCrumbs Bakery — London's Finest Cakes</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #fdf6ee;
    --blush: #f5e6d8;
    --warm-white: #fffaf5;
    --dusty-rose: #e8c4b8;
    --mocha: #6b4c3b;
    --espresso: #3d2314;
    --caramel: #c8834a;
    --sage: #8a9e80;
    --gold: #c9a84c;
    --text-dark: #2d1a0e;
    --text-mid: #5a3e2b;
    --text-light: #9b7b64;
    --shadow: rgba(61,35,20,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--text-dark); overflow-x: hidden; }
  h1,h2,h3,h4,h5 { font-family: 'Times New Roman', Times, serif; font-weight: 700; }

  /* NAV */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    background: rgba(253,246,238,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--dusty-rose);
    padding: 0 5%;
    display: flex; align-items: center; justify-content: space-between; height: 70px;
  }
  .nav-logo { font-family: 'Times New Roman', serif; font-weight: 700; font-size: 1.6rem; color: var(--espresso); letter-spacing: 1px; }
  .nav-logo span { color: var(--caramel); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-size: 0.88rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-mid); text-decoration: none; transition: color 0.3s; }
  .nav-links a:hover { color: var(--caramel); }
  .nav-actions { display: flex; gap: 1rem; align-items: center; }
  .btn-nav { background: var(--mocha); color: #fff; border: none; padding: 8px 20px; font-family: 'Lato', sans-serif; font-size: 0.82rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: background 0.3s; }
  .btn-nav:hover { background: var(--espresso); }
  .cart-btn { position: relative; background: none; border: 1.5px solid var(--mocha); color: var(--mocha); padding: 8px 16px; font-size: 0.82rem; cursor: pointer; border-radius: 2px; transition: all 0.3s; font-family: 'Lato', sans-serif; }
  .cart-btn:hover { background: var(--mocha); color: #fff; }
  .cart-count { position: absolute; top: -8px; right: -8px; background: var(--caramel); color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }

  /* HERO */
  .hero {
    min-height: 100vh; position: relative; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, rgba(61,35,20,0.55) 0%, rgba(200,131,74,0.3) 100%),
      url('https://images.unsplash.com/photo-1509440159596-0249088772ff?w=1600&q=80') center/cover no-repeat;
    text-align: center; color: #fff;
  }
  .hero-content { max-width: 700px; padding: 2rem; }
  .hero-badge { display: inline-block; border: 1px solid rgba(255,255,255,0.6); padding: 6px 20px; font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 1.5rem; }
  .hero h1 { font-size: clamp(2.5rem, 6vw, 5rem); line-height: 1.1; margin-bottom: 1.2rem; text-shadow: 0 2px 20px rgba(0,0,0,0.3); }
  .hero p { font-size: 1.15rem; font-weight: 300; opacity: 0.92; margin-bottom: 2.5rem; line-height: 1.7; }
  .hero-ctas { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .btn-primary { background: var(--caramel); color: #fff; border: none; padding: 14px 36px; font-family: 'Times New Roman', serif; font-weight: 700; font-size: 1rem; cursor: pointer; border-radius: 2px; transition: all 0.3s; text-decoration: none; }
  .btn-primary:hover { background: var(--mocha); transform: translateY(-2px); }
  .btn-outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.8); padding: 14px 36px; font-family: 'Times New Roman', serif; font-weight: 700; font-size: 1rem; cursor: pointer; border-radius: 2px; transition: all 0.3s; }
  .btn-outline:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }

  /* SECTIONS */
  section { padding: 6rem 5%; }
  .section-tag { font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; color: var(--caramel); display: block; margin-bottom: 0.7rem; }
  .section-title { font-size: clamp(2rem, 4vw, 3rem); color: var(--espresso); margin-bottom: 1.2rem; line-height: 1.15; }
  .section-sub { color: var(--text-light); font-size: 1.05rem; line-height: 1.7; max-width: 600px; }
  .divider { width: 60px; height: 3px; background: var(--caramel); margin: 1.5rem 0; }

  /* REPUTATION CARDS */
  .reputation { background: var(--espresso); padding: 4rem 5%; }
  .rep-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
  .rep-card {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    padding: 2rem 1.5rem; border-radius: 4px; text-align: center;
    transition: all 0.4s; cursor: default;
  }
  .rep-card:hover { background: rgba(200,131,74,0.2); border-color: var(--caramel); transform: translateY(-5px); }
  .rep-icon { font-size: 2.2rem; margin-bottom: 1rem; display: block; }
  .rep-card h3 { color: #fff; font-size: 1.1rem; margin-bottom: 0.5rem; }
  .rep-card p { color: rgba(255,255,255,0.65); font-size: 0.88rem; line-height: 1.6; }
  .rep-card .quote { font-style: italic; font-size: 0.95rem; color: var(--caramel); margin-top: 0.8rem; font-family: 'Times New Roman', serif; }

  /* COLLECTIONS / PRODUCTS */
  .collections { background: var(--warm-white); }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2rem; max-width: 1300px; margin: 3rem auto 0; }
  .product-card { border-radius: 4px; overflow: hidden; background: #fff; box-shadow: 0 2px 20px var(--shadow); transition: all 0.4s; }
  .product-card:hover { transform: translateY(-8px); box-shadow: 0 12px 40px var(--shadow); }
  .product-img-wrap { position: relative; height: 240px; overflow: hidden; cursor: pointer; }
  .product-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s, transform 0.5s; }
  .product-img-wrap .img-hover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }
  .product-card:hover .img-hover { opacity: 1; }
  .product-card:hover .product-img-wrap img { transform: scale(1.05); }
  .product-badge { position: absolute; top: 12px; left: 12px; background: var(--caramel); color: #fff; font-size: 0.72rem; letter-spacing: 1px; padding: 4px 12px; border-radius: 2px; text-transform: uppercase; }
  .product-info { padding: 1.4rem; }
  .product-info h3 { font-size: 1.15rem; color: var(--espresso); margin-bottom: 0.3rem; }
  .product-info p { font-size: 0.85rem; color: var(--text-light); margin-bottom: 1rem; line-height: 1.5; }
  .product-footer { display: flex; align-items: center; justify-content: space-between; }
  .price { font-family: 'Times New Roman', serif; font-weight: 700; font-size: 1.2rem; color: var(--mocha); }
  .price small { font-size: 0.75rem; color: var(--text-light); font-family: 'Lato', sans-serif; font-weight: 400; }
  .btn-cart { background: var(--mocha); color: #fff; border: none; padding: 9px 18px; font-size: 0.82rem; cursor: pointer; border-radius: 2px; transition: all 0.3s; font-family: 'Lato', sans-serif; letter-spacing: 0.5px; }
  .btn-cart:hover { background: var(--espresso); }

  /* GALLERY - Making Cakes */
  .gallery { background: var(--blush); }
  .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: auto auto; gap: 1rem; max-width: 1200px; margin: 3rem auto 0; }
  .gallery-item { position: relative; overflow: hidden; border-radius: 4px; cursor: pointer; }
  .gallery-item.large { grid-column: span 2; }
  .gallery-item img { width: 100%; height: 300px; object-fit: cover; transition: transform 0.6s; display: block; }
  .gallery-item.large img { height: 400px; }
  .gallery-item:hover img { transform: scale(1.06); }
  .gallery-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(61,35,20,0.75) 0%, transparent 60%); opacity: 0; transition: opacity 0.4s; display: flex; align-items: flex-end; padding: 1.5rem; }
  .gallery-item:hover .gallery-overlay { opacity: 1; }
  .gallery-overlay h4 { color: #fff; font-size: 1rem; }
  .gallery-overlay p { color: rgba(255,255,255,0.8); font-size: 0.82rem; margin-top: 3px; }

  /* UPCOMING ORDERS */
  .upcoming { background: var(--warm-white); }
  .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 3rem auto 0; }
  .order-card { background: #fff; border: 1px solid var(--dusty-rose); border-radius: 4px; padding: 1.8rem; transition: all 0.35s; position: relative; overflow: hidden; }
  .order-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--caramel); }
  .order-card:hover { transform: translateX(4px); box-shadow: 0 8px 30px var(--shadow); }
  .order-date { font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--caramel); margin-bottom: 0.5rem; }
  .order-card h3 { font-size: 1.1rem; color: var(--espresso); margin-bottom: 0.4rem; }
  .order-card p { font-size: 0.87rem; color: var(--text-light); line-height: 1.5; }
  .order-slots { display: flex; align-items: center; gap: 6px; margin-top: 1rem; }
  .slot-pill { background: var(--blush); color: var(--mocha); font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; }
  .slot-pill.full { background: #f5e6e6; color: #a33; }

  /* ABOUT */
  .about { background: var(--cream); }
  .about-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; max-width: 1200px; margin: 0 auto; }
  .about-img-wrap { position: relative; border-radius: 4px; overflow: hidden; height: 520px; }
  .about-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
  .about-img-wrap:hover img { transform: scale(1.04); }
  .about-img-wrap .hover-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.6s; }
  .about-img-wrap:hover .hover-img { opacity: 1; }
  .about-text .section-sub { max-width: 100%; }
  .about-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
  .stat-box { background: var(--blush); padding: 1.2rem; border-radius: 4px; text-align: center; }
  .stat-box .num { font-family: 'Times New Roman', serif; font-size: 2rem; font-weight: 700; color: var(--mocha); display: block; }
  .stat-box span:last-child { font-size: 0.8rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; }

  /* TESTIMONIALS */
  .testimonials { background: var(--espresso); }
  .testimonials .section-title { color: #fff; }
  .testimonials .section-tag { color: var(--dusty-rose); }
  .testimonials .divider { background: var(--dusty-rose); }
  .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 3rem auto 0; }
  .test-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 2rem; transition: all 0.4s; }
  .test-card:hover { background: rgba(200,131,74,0.15); border-color: var(--caramel); transform: translateY(-5px); }
  .stars { color: var(--gold); font-size: 1rem; letter-spacing: 2px; margin-bottom: 1rem; }
  .test-card blockquote { color: rgba(255,255,255,0.85); font-size: 0.95rem; line-height: 1.7; font-style: italic; font-family: 'Times New Roman', serif; margin-bottom: 1.5rem; }
  .test-author { display: flex; align-items: center; gap: 12px; }
  .test-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--caramel); }
  .test-name { color: #fff; font-size: 0.9rem; font-weight: 700; }
  .test-label { color: rgba(255,255,255,0.5); font-size: 0.78rem; }

  /* CONTACT */
  .contact { background: var(--warm-white); }
  .contact-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; max-width: 1200px; margin: 0 auto; }
  .contact-info h3 { font-size: 1.4rem; color: var(--espresso); margin-bottom: 0.8rem; }
  .contact-info p { color: var(--text-mid); line-height: 1.7; margin-bottom: 2rem; }
  .info-item { display: flex; gap: 12px; margin-bottom: 1.2rem; }
  .info-icon { font-size: 1.3rem; }
  .info-item h4 { font-size: 0.9rem; color: var(--espresso); }
  .info-item p { font-size: 0.85rem; color: var(--text-light); margin: 0; }
  .contact-form { display: flex; flex-direction: column; gap: 1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; color: var(--text-mid); }
  .form-group input, .form-group textarea, .form-group select {
    border: 1px solid var(--dusty-rose); padding: 12px 14px; font-family: 'Lato', sans-serif;
    font-size: 0.92rem; background: var(--cream); border-radius: 2px; transition: border 0.3s; color: var(--text-dark); outline: none;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--caramel); }
  .form-group textarea { resize: vertical; min-height: 120px; }

  /* SUBSCRIBE */
  .subscribe-bar { background: var(--caramel); padding: 3rem 5%; text-align: center; }
  .subscribe-bar h2 { color: #fff; font-size: 1.8rem; margin-bottom: 0.5rem; }
  .subscribe-bar p { color: rgba(255,255,255,0.85); margin-bottom: 1.5rem; }
  .subscribe-form { display: flex; gap: 0; max-width: 480px; margin: 0 auto; }
  .subscribe-form input { flex: 1; padding: 14px 18px; border: none; font-family: 'Lato', sans-serif; font-size: 0.95rem; background: #fff; outline: none; }
  .subscribe-form button { padding: 14px 24px; background: var(--espresso); color: #fff; border: none; cursor: pointer; font-family: 'Lato', sans-serif; font-size: 0.9rem; transition: background 0.3s; white-space: nowrap; }
  .subscribe-form button:hover { background: #1a0a04; }

  /* FOOTER */
  footer { background: var(--text-dark); padding: 4rem 5% 2rem; }
  .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 3rem; max-width: 1200px; margin: 0 auto 3rem; }
  .footer-brand .nav-logo { color: #fff; display: block; margin-bottom: 1rem; font-size: 1.5rem; }
  .footer-brand p { color: rgba(255,255,255,0.55); font-size: 0.87rem; line-height: 1.7; }
  .footer-col h4 { color: #fff; font-size: 0.9rem; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 1.2rem; }
  .footer-col ul { list-style: none; }
  .footer-col ul li { margin-bottom: 0.6rem; }
  .footer-col ul li a { color: rgba(255,255,255,0.55); font-size: 0.87rem; text-decoration: none; transition: color 0.3s; }
  .footer-col ul li a:hover { color: var(--caramel); }
  .footer-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 2rem; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
  .footer-bottom p { color: rgba(255,255,255,0.4); font-size: 0.8rem; }
  .footer-feedback { margin-top: 2rem; max-width: 1200px; margin: 2rem auto 0; }
  .footer-feedback h4 { color: #fff; font-family: 'Times New Roman', serif; font-size: 1.3rem; margin-bottom: 1.2rem; }
  .feedback-scroll { display: flex; gap: 1.2rem; overflow-x: auto; padding-bottom: 1rem; }
  .feedback-scroll::-webkit-scrollbar { height: 4px; }
  .feedback-scroll::-webkit-scrollbar-thumb { background: var(--caramel); border-radius: 2px; }
  .fb-card { min-width: 220px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 1.2rem; flex-shrink: 0; transition: all 0.35s; }
  .fb-card:hover { background: rgba(200,131,74,0.15); transform: translateY(-3px); }
  .fb-stars { color: var(--gold); font-size: 0.85rem; margin-bottom: 0.5rem; }
  .fb-card p { color: rgba(255,255,255,0.7); font-size: 0.82rem; font-style: italic; line-height: 1.5; margin-bottom: 0.8rem; }
  .fb-card span { color: rgba(255,255,255,0.45); font-size: 0.75rem; }

  /* CART MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 2000; display: flex; align-items: flex-end; justify-content: flex-end; padding: 0; }
  .cart-panel { background: var(--warm-white); width: 420px; height: 100vh; display: flex; flex-direction: column; box-shadow: -8px 0 40px rgba(0,0,0,0.2); animation: slideIn 0.35s ease; overflow: hidden; }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .cart-header { padding: 1.5rem; border-bottom: 1px solid var(--dusty-rose); display: flex; justify-content: space-between; align-items: center; }
  .cart-header h2 { font-size: 1.3rem; color: var(--espresso); }
  .cart-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-light); transition: color 0.3s; }
  .cart-close:hover { color: var(--mocha); }
  .cart-items { flex: 1; overflow-y: auto; padding: 1.2rem; }
  .cart-item { display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--blush); }
  .cart-item img { width: 72px; height: 72px; object-fit: cover; border-radius: 4px; }
  .cart-item-info { flex: 1; }
  .cart-item-info h4 { font-size: 0.95rem; color: var(--espresso); margin-bottom: 3px; }
  .cart-item-info .c-price { font-size: 0.9rem; color: var(--caramel); font-weight: 700; }
  .qty-ctrl { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .qty-btn { width: 28px; height: 28px; border: 1.5px solid var(--dusty-rose); background: #fff; cursor: pointer; font-size: 1rem; border-radius: 2px; display: flex; align-items: center; justify-content: center; color: var(--mocha); transition: all 0.2s; }
  .qty-btn:hover { background: var(--mocha); color: #fff; border-color: var(--mocha); }
  .qty-num { font-size: 0.9rem; font-weight: 700; min-width: 20px; text-align: center; color: var(--espresso); }
  .remove-btn { background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 1.1rem; margin-left: auto; transition: color 0.2s; }
  .remove-btn:hover { color: #a33; }
  .cart-footer { padding: 1.5rem; border-top: 1px solid var(--dusty-rose); }
  .cart-total { display: flex; justify-content: space-between; margin-bottom: 1rem; }
  .cart-total span { font-size: 1.05rem; color: var(--text-mid); }
  .cart-total strong { font-size: 1.2rem; color: var(--espresso); font-family: 'Times New Roman', serif; }
  .btn-checkout { width: 100%; background: var(--mocha); color: #fff; border: none; padding: 15px; font-family: 'Times New Roman', serif; font-size: 1.05rem; font-weight: 700; cursor: pointer; border-radius: 2px; transition: background 0.3s; letter-spacing: 1px; }
  .btn-checkout:hover { background: var(--espresso); }
  .empty-cart { text-align: center; padding: 3rem 1rem; color: var(--text-light); }
  .empty-cart p { margin-top: 0.5rem; font-size: 0.9rem; }

  /* ADD TO CART TOAST */
  .toast { position: fixed; top: 90px; right: 20px; z-index: 3000; background: var(--mocha); color: #fff; padding: 14px 22px; border-radius: 4px; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; animation: toastIn 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .toast-out { animation: toastOut 0.3s ease forwards; }
  @keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }

  /* AUTH MODAL */
  .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2500; display: flex; align-items: center; justify-content: center; }
  .auth-box { background: var(--warm-white); width: 420px; max-width: 92vw; border-radius: 4px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .auth-top { background: var(--espresso); padding: 2rem; text-align: center; }
  .auth-top h2 { color: #fff; font-size: 1.6rem; }
  .auth-top p { color: rgba(255,255,255,0.6); margin-top: 0.3rem; font-size: 0.88rem; }
  .auth-tabs { display: flex; }
  .auth-tab { flex: 1; padding: 1rem; background: none; border: none; border-bottom: 3px solid transparent; font-family: 'Times New Roman', serif; font-size: 1rem; font-weight: 700; cursor: pointer; color: var(--text-light); transition: all 0.3s; }
  .auth-tab.active { border-bottom-color: var(--caramel); color: var(--mocha); }
  .auth-body { padding: 2rem; }
  .auth-body .form-group { margin-bottom: 1rem; }
  .auth-body input { width: 100%; }
  .btn-auth { width: 100%; background: var(--caramel); color: #fff; border: none; padding: 13px; font-family: 'Times New Roman', serif; font-weight: 700; font-size: 1rem; cursor: pointer; border-radius: 2px; margin-top: 0.5rem; transition: background 0.3s; }
  .btn-auth:hover { background: var(--mocha); }

function StarRating({ n }) {
  return <span>{'★'.repeat(n)}{'☆'.repeat(5-n)}</span>;

function Toast({ msg, onDone }) {
  const [out, setOut] = useState(false);
  useEffect(() => {
    const t1 = setTimeout(() => setOut(true), 2200);
    const t2 = setTimeout(() => onDone(), 2600);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);
  return <div className={`toast${out?' toast-out':''}`}>✓ {msg}</div>;
}

          </div>
          <div className="footer-col">
            <h4>Services</h4>
            <ul>
              <li><a href="#">Same-Day Delivery</a></li>
              <li><a href="#">Click & Collect</a></li>
              <li><a href="#">Bespoke Cakes</a></li>
              <li><a href="#">Wedding Cakes</a></li>
              <li><a href="#">Corporate Catering</a></li>
            </ul>
          </div>
          <div className="footer-col">
            <h4>Support</h4>
            <ul>
              <li><a href="#">FAQ</a></li>
              <li><a href="#">Allergen Info</a></li>
              <li><a href="#">Delivery Policy</a></li>
              <li><a href="#">Returns</a></li>
              <li><a href="#contact">Contact</a></li>
            </ul>
          </div>
        </div>
        <div className="footer-feedback">
          <h4>Client Feedback</h4>
          <div className="feedback-scroll">
            {FOOTER_FEEDBACK.map((f,i) => (
              <div className="fb-card" key={i}>
                <div className="fb-stars"><StarRating n={f.stars} /></div>
                <p>{f.text}</p>
                <span>— {f.name}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="footer-bottom">
          <p>© 2026 SweetCrumbs Bakery Ltd. All rights reserved. Registered in England & Wales.</p>
          <p>Apple Pay · Google Pay · Cash on Delivery</p>
        </div>
      </footer>

      {/* MODALS */}
      {cartOpen && <CartModal cart={cart} onClose={()=>setCartOpen(false)} onQty={adjustQty} onRemove={removeItem} />}
      {authOpen && <AuthModal onClose={()=>setAuthOpen(false)} />}
      {toast && <Toast msg={toast} onDone={()=>setToast(null)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
